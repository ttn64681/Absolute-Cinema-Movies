spring.application.name=cinema-ebkg-system

# Database Configuration - Neon PostgreSQL
# Uses environment variables set by set_env.sh
spring.datasource.url=${DB_URL}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION}
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION}

# Remember Me Token Expiration (extended for persistent login)
# Access token: 30 minutes, Refresh token: 1 hour (for testing)
jwt.remember-me-access-token-expiration=${JWT_REMEMBER_ME_ACCESS_TOKEN_EXPIRATION:1800000}
jwt.remember-me-refresh-token-expiration=${JWT_REMEMBER_ME_REFRESH_TOKEN_EXPIRATION:3600000}

# JPA/Hibernate Configuration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# validate ensures DB matches entity definitions without modifying tables
# create-drop creates the DB and drops it when the app is stopped (DESTROYS DATA!)
# update updates the DB schema based on entity changes (CAUSES PERMISSION ERRORS ON NEON)
# none does nothing (manual schema management)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Springboot Server Configuration
server.port=8080

# CORS is configured via CorsConfig.java

# Email Configuration
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000

# Application URLs for email links
app.base.url=${APP_BASE_URL:http://localhost:8080}
app.frontend.url=${APP_FRONTEND_URL:http://localhost:3000}

# Actuator: only health endpoint for Render/load balancer health checks
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
# Don't fail overall health when SMTP is unreachable (e.g. Render network / Gmail block)
management.health.mail.enabled=false

